<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <script>(function(){var t=localStorage.getItem('roomsy-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Requests — Roomsy</title>
  <link rel="stylesheet" th:href="@{/css/roomsy.css}"/>
  <script th:src="@{/js/theme.js}" defer></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-body);background:var(--paper);color:var(--ink);}
    .nav{display:flex;gap:10px;align-items:center;}
    .nav a{color:rgba(251,247,242,0.78);text-decoration:none;font-weight:500;font-size:0.85rem;padding:7px 12px;border-radius:7px;transition:background .15s;}
    .nav a:hover{background:rgba(251,247,242,0.08);color:#FBF7F2;}
    .page-header{background:var(--white);padding:22px 40px;border-bottom:1px solid var(--line);}
    .page-header h1{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:3px;}
    .page-header p{color:var(--ink-soft);font-size:0.85rem;}
    .flash{margin:14px 40px 0;padding:12px 16px;border-radius:var(--radius-tag-sm);}
    .content{padding:22px 40px 60px;}

    .booking-card{background:var(--white);border-radius:var(--radius-tag-sm);border:1px solid var(--line);box-shadow:var(--shadow-card);padding:18px 22px;margin-bottom:14px;transition:all .2s;}
    .booking-card:hover{box-shadow:var(--shadow-lift);}
    .bc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .tenant-info{display:flex;gap:11px;align-items:center;}
    .t-av{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:0.9rem;}
    .t-name{font-family:var(--font-display);font-size:0.9rem;font-weight:700;color:var(--ink);}
    .t-contact{font-size:0.74rem;color:var(--ink-soft);}
    .t-contact a{color:var(--clay);text-decoration:none;}

    .bc-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:var(--paper-dim);border-radius:9px;padding:11px 15px;margin-bottom:11px;}
    .bd-item .bd-label{color:var(--ink-soft);font-weight:600;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.4px;margin-bottom:2px;}
    .bd-item .bd-value{font-weight:700;font-size:0.82rem;color:var(--ink);}

    .bc-msg{font-size:0.78rem;color:var(--ink-soft);font-style:italic;margin-bottom:11px;padding:9px 13px;background:var(--paper-dim);border-radius:7px;border-left:3px solid var(--line);}
    .bc-actions{display:flex;gap:8px;}

    .empty{text-align:center;padding:56px;color:var(--ink-soft);}
    .empty .ei{font-size:2.2rem;margin-bottom:12px;}
    .empty h3{font-family:var(--font-display);font-size:1rem;color:var(--ink);margin-bottom:6px;}

    @media(max-width:768px){.content,.page-header{padding-left:20px;padding-right:20px;}.bc-details{grid-template-columns:1fr 1fr;}.bc-top{flex-direction:column;gap:10px;}.rs-navbar{padding:0 20px;}}
  </style>
</head>
<body>
  <nav class="rs-navbar">
    <a href="/" class="rs-logo">Room<span>sy</span></a>
    <div class="nav">
      <button type="button" class="theme-toggle" onclick="toggleRoomsyTheme()" aria-label="Toggle dark mode">
        <span class="icon-light">🌙</span><span class="icon-dark">☀️</span>
      </button>
      <a href="/owner/dashboard">← Dashboard</a>
      <a href="/owner/pg/add" class="btn btn-clay btn-sm">+ Add PG</a>
      <a href="/logout" style="background:rgba(199,93,59,0.15);border:1px solid rgba(199,93,59,0.3);">Logout</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>📅 Booking requests</h1>
    <p>Review and respond to tenant visit requests for your PGs.</p>
  </div>
  <div class="flash alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>

  <div class="content">
    <div class="empty" th:if="${#lists.isEmpty(bookings)}">
      <div class="ei">📭</div>
      <h3>No booking requests yet</h3>
      <p>When tenants request visits to your PGs, they'll appear here.</p>
    </div>

    <div th:each="b : ${bookings}" class="booking-card">
      <div class="bc-top">
        <div class="tenant-info">
          <div class="t-av" th:text="${#strings.substring(b.tenant.fullName,0,1)}">T</div>
          <div>
            <div class="t-name" th:text="${b.tenant.fullName}">Tenant</div>
            <div class="t-contact">
              📧 <span th:text="${b.tenant.email}">email</span> ·
              📞 <a th:href="'tel:' + ${b.tenant.phone}" th:text="${b.tenant.phone}">phone</a>
            </div>
          </div>
        </div>
        <span class="pill"
          th:classappend="${b.status == 'PENDING'} ? 'pill-gold' :
                          (${b.status == 'CONFIRMED'} ? 'pill-sage' : 'pill-clay')"
          th:text="${b.status}">Status</span>
      </div>

      <div class="bc-details">
        <div class="bd-item"><div class="bd-label">PG</div><div class="bd-value" th:text="${b.pgListing.pgName}">PG</div></div>
        <div class="bd-item"><div class="bd-label">Visit date</div><div class="bd-value" th:text="${b.visitDate}">Date</div></div>
        <div class="bd-item"><div class="bd-label">Requested on</div><div class="bd-value" th:text="${#temporals.format(b.createdAt,'dd MMM yyyy')}">Date</div></div>
      </div>

      <div class="bc-msg" th:if="${b.message != null and !b.message.isEmpty()}"
           th:text="'💬 ' + ${b.message}">Message</div>

      <div class="bc-actions">
        <th:block th:if="${b.status == 'PENDING'}">
          <form th:action="@{/owner/booking/confirm/{id}(id=${b.id})}" method="post" style="display:inline">
            <button type="submit" class="btn btn-sage btn-sm">✅ Confirm visit</button>
          </form>
          <form th:action="@{/owner/booking/reject/{id}(id=${b.id})}" method="post" style="display:inline">
            <button type="submit" class="btn btn-danger btn-sm">❌ Reject</button>
          </form>
        </th:block>
        <a th:href="@{/pg/{id}(id=${b.pgListing.id})}" class="btn btn-outline btn-sm">👁 View PG</a>
      </div>
    </div>
  </div>
</body>
</html>
