# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── H2 (Default - works without any setup) ────────────────────
spring.datasource.url=jdbc:h2:mem:roomsydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Session Timeout (30 minutes) ──────────────────────────────
server.servlet.session.timeout=30m

# ── Admin Credentials — override via env in production ────────
app.admin.email=${APP_ADMIN_EMAIL:admin@roomsy.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.admin.name=${APP_ADMIN_NAME:Roomsy Admin}
