<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <script>(function(){var t=localStorage.getItem('roomsy-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings — Roomsy</title>
  <link rel="stylesheet" th:href="@{/css/roomsy.css}"/>
  <script th:src="@{/js/theme.js}" defer></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-body);background:var(--paper);color:var(--ink);}
    .nav{display:flex;gap:12px;align-items:center;}
    .nav a{color:rgba(251,247,242,0.78);text-decoration:none;font-weight:500;font-size:0.85rem;padding:6px 12px;border-radius:7px;transition:background .15s;}
    .nav a:hover{background:rgba(251,247,242,0.08);color:#FBF7F2;}
    .page-header{background:var(--white);padding:24px 40px;border-bottom:1px solid var(--line);}
    .page-header h1{font-family:var(--font-display);font-size:1.45rem;font-weight:700;color:var(--ink);margin-bottom:3px;}
    .page-header p{color:var(--ink-soft);font-size:0.86rem;}
    .flash{margin:14px 40px 0;padding:12px 16px;border-radius:var(--radius-tag-sm);}
    .content{padding:24px 40px 60px;}

    .booking-card{background:var(--white);border-radius:var(--radius-tag-sm);border:1px solid var(--line);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:14px;display:flex;align-items:center;gap:18px;transition:all .2s;}
    .booking-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);}
    .b-thumb{width:54px;height:54px;border-radius:12px;background:linear-gradient(135deg,var(--clay),var(--clay-deep));display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
    .b-info{flex:1;}
    .b-info h3{font-family:var(--font-display);font-size:0.96rem;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .b-info .loc{font-size:0.78rem;color:var(--ink-soft);margin-bottom:6px;}
    .b-info .meta{display:flex;gap:16px;font-size:0.74rem;color:var(--ink-soft);}
    .b-info .meta a{color:var(--clay);text-decoration:none;}
    .b-msg{font-size:0.76rem;color:var(--ink-soft);margin-top:6px;font-style:italic;}
    .b-status{text-align:right;flex-shrink:0;}
    .b-date{font-size:0.7rem;color:var(--ink-soft);margin-top:5px;}

    .empty{text-align:center;padding:60px;color:var(--ink-soft);}
    .empty .ei{font-size:2.4rem;margin-bottom:12px;}
    .empty h3{font-family:var(--font-display);font-size:1.05rem;color:var(--ink);margin-bottom:6px;}

    @media(max-width:768px){.content,.page-header{padding-left:20px;padding-right:20px;}.booking-card{flex-direction:column;align-items:flex-start;}.b-status{text-align:left;}.rs-navbar{padding:0 20px;}}
  </style>
</head>
<body>
  <nav class="rs-navbar">
    <a href="/" class="rs-logo">Room<span>sy</span></a>
    <div class="nav">
      <button type="button" class="theme-toggle" onclick="toggleRoomsyTheme()" aria-label="Toggle dark mode">
        <span class="icon-light">🌙</span><span class="icon-dark">☀️</span>
      </button>
      <a href="/tenant/dashboard">Dashboard</a>
      <a href="/listings">Browse PGs</a>
      <a href="/logout" style="background:rgba(199,93,59,0.2);border:1px solid rgba(199,93,59,0.3);">Logout</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>📋 My bookings</h1>
    <p th:text="'Hello ' + ${tenant.fullName} + ' — here are all your visit requests'">Bookings</p>
  </div>
  <div class="flash alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>

  <div class="content">
    <div class="empty" th:if="${#lists.isEmpty(bookings)}">
      <div class="ei">📭</div>
      <h3>No bookings yet</h3>
      <p>Browse PGs and book a visit to get started.</p>
      <a href="/listings" class="btn btn-clay btn-sm" style="margin-top:14px;">Browse PGs →</a>
    </div>

    <div th:each="b : ${bookings}" class="booking-card">
      <div class="b-thumb">🏠</div>
      <div class="b-info">
        <h3 th:text="${b.pgListing.pgName}">PG Name</h3>
        <div class="loc">📍 <span th:text="${b.pgListing.location}"></span>, <span th:text="${b.pgListing.city}"></span></div>
        <div class="meta">
          <span>📅 Visit: <strong th:text="${b.visitDate}">Date</strong></span>
          <span>💰 <strong th:text="'₹' + ${b.pgListing.rent} + '/mo'">Rent</strong></span>
          <span>📞 <a th:href="'tel:' + ${b.pgListing.phone}" th:text="${b.pgListing.phone}">Phone</a></span>
        </div>
        <div class="b-msg" th:if="${b.message != null}" th:text="'Your message: ' + ${b.message}">msg</div>
      </div>
      <div class="b-status">
        <span class="pill"
          th:classappend="${b.status == 'PENDING'} ? 'pill-gold' :
                          (${b.status == 'CONFIRMED'} ? 'pill-sage' : 'pill-clay')"
          th:text="${b.status}">Status</span>
        <div class="b-date" th:text="'Requested: ' + ${#temporals.format(b.createdAt, 'dd MMM yyyy')}">Date</div>
      </div>
    </div>
  </div>
</body>
</html>
