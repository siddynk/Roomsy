<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <script>(function(){var t=localStorage.getItem('roomsy-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Roomsy</title>
  <link rel="stylesheet" th:href="@{/css/roomsy.css}"/>
  <script>
    (function(){var t=localStorage.getItem('roomsy-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();
    window.toggleRoomsyTheme=function(){var d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');localStorage.setItem('roomsy-theme','light');}else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('roomsy-theme','dark');}};
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-body);min-height:100vh;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-tag);padding:42px 46px;width:100%;max-width:420px;box-shadow:var(--shadow-lift);position:relative;}
    .toggle-corner{position:absolute;top:18px;right:18px;}
    .logo{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--ink);text-decoration:none;display:block;margin-bottom:6px;}
    .logo span{color:var(--clay);font-style:italic;}
    .admin-badge{display:inline-block;background:rgba(199,93,59,0.1);color:var(--clay);border:1px solid rgba(199,93,59,0.25);padding:4px 12px;border-radius:100px;font-size:0.7rem;font-weight:700;margin-bottom:22px;}
    h2{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:4px;}
    p{font-size:0.82rem;color:var(--ink-soft);margin-bottom:22px;}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
    .fg label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-soft);}
    .fg input{padding:11px 14px;border:2px solid var(--line);border-radius:10px;font-family:var(--font-body);font-size:0.9rem;outline:none;background:var(--paper-dim);color:var(--ink);transition:border-color .15s;width:100%;}
    .fg input:focus{border-color:var(--clay);background:var(--white);}
    .back{display:block;text-align:center;margin-top:14px;font-size:0.8rem;color:var(--ink-soft);text-decoration:none;}
    .back:hover{color:var(--ink);}
    .hint-box{background:var(--paper-dim);border-radius:9px;padding:11px 14px;font-size:0.74rem;color:var(--ink-soft);margin-top:14px;border:1px solid var(--line);}
    .hint-box strong{color:var(--ink);}
  </style>
</head>
<body>
  <div class="card">
    <div class="toggle-corner">
      <button type="button" class="theme-toggle" onclick="toggleRoomsyTheme()" aria-label="Toggle dark mode"
              style="border-color:var(--line);color:var(--ink);background:var(--paper-dim);">
        <span class="icon-light">🌙</span><span class="icon-dark">☀️</span>
      </button>
    </div>
    <a href="/" class="logo">Room<span>sy</span></a>
    <div class="admin-badge">🔐 Admin portal</div>
    <h2>Admin login</h2>
    <p>Restricted access — authorised personnel only.</p>
    <div class="alert alert-error" th:if="${error}" th:text="${error}" style="margin-bottom:14px;"></div>
    <form action="/admin/login" method="post">
      <div class="fg"><label>Admin email</label><input type="email" name="email" placeholder="admin@roomsy.com" required/></div>
      <div class="fg"><label>Password</label><input type="password" name="password" placeholder="Admin password" required/></div>
      <button type="submit" class="btn btn-ink btn-block">Login to admin panel →</button>
    </form>
    <a href="/" class="back">← Back to public site</a>
    <div class="hint-box">
      <strong>Default credentials</strong><br/>
      Email: admin@roomsy.com<br/>
      Password: admin123
    </div>
  </div>
</body>
</html>
