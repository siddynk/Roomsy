# ── MySQL Profile ─────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=mysql
# Or in IntelliJ: Edit Run Config → Active Profiles → mysql

spring.datasource.url=jdbc:mysql://localhost:3306/roomsydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_mysql_password

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false
spring.thymeleaf.cache=true
